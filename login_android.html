<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numpak Ngeng | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        .header {
            background: #ff4757;
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-button {
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
        }

        .header-desc {
            padding: 16px 16px 24px;
            background: #ff4757;
            color: white;
            font-size: 14px;
            line-height: 1.4;
        }

        .form-container {
            padding: 24px 16px;
            background: white;
            border-radius: 20px 20px 0 0;
            margin-top: -8px;
        }

        .form-label {
            font-size: 14px;
            color: #687176;
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e7ea;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .form-input::placeholder {
            color: #b0b8bc;
        }

        .continue-button {
            width: 100%;
            padding: 12px;
            background: #e8e8e8;
            border: none;
            border-radius: 4px;
            color: #989898;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .divider {
            text-align: center;
            color: #687176;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .social-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 14px;
            position: relative;
        }

        .social-button.google {
            background: #e8f3ff;
            color: #0d1b2a;
        }

        .social-button.facebook {
            background: #e8f3ff;
            color: #0d1b2a;
        }

        .social-icon {
            position: absolute;
            right: 16px;
            width: 20px;
            height: 20px;
        }

        .terms {
            font-size: 12px;
            color: #687176;
            text-align: left;
            line-height: 1.6;
            padding: 0 16px;
            margin-top: 16px;
        }

        .terms a {
            color: #0064D2;
            text-decoration: none;
        }

        a {
            text-decoration: none;
        }

         /* Style for active button when input has content */
         .continue-button.active {
            background: #ff4757;
            color: white;
        }

        .divider {
            text-align: center;
            color: #687176;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .social-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 14px;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-button">←</a>
            <h1 class="header-title">Login/Daftar</h1>
        </div>
        <div class="header-desc">
            Buat akun Traveloka & nikmati seluruh fitur kami untuk pengalaman traveling lebih mudah!
        </div>
        
        <div class="form-container">
            <label class="form-label">Email/No. Handphone</label>
            <input type="text" class="form-input" placeholder="Masukkan email atau no. handphone-mu">
            <a href="halaman_login.html">
                <button class="continue-button">Lanjutkan</button>
            </a>
            
            <div class="divider">atau login/daftar dengan</div>
            
            <a href="halaman_login.html"><button class="social-button google">
                Google
                <img src="google.png" alt="Google icon" style="width: 20px; height: 20px;">
            </button></a>
            <a href="halaman_login.html"><button class="social-button facebook">
                Facebook
                <img src="facebook.png" alt="Facebook icon" style="width: 20px; height: 20px;">
            </button></a>
            
            <div class="terms">
                Dengan mendaftar, kamu menyetujui <a href="#">Syarat & Ketentuan</a> yang berlaku dan kamu sudah membaca <a href="#">Pemberitahuan Privasi</a> kami.
            </div>
        </div>
    </div>
    <script>
        // Get the input and button elements
        const input = document.querySelector('.form-input');
        const button = document.querySelector('.continue-button');

        // Add input event listener to check for content
        input.addEventListener('input', function() {
            // If input has content (not empty)
            if (this.value.trim() !== '') {
                button.classList.add('active');
            } else {
                button.classList.remove('active');
            }
        });
    </script>
</body>
</html>
